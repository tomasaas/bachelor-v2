<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubik's Cube Solver</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="layout">
    <!-- LEFT: Two camera quadrants stacked -->
    <div class="cameras-column">
      <div class="cam-quadrant" id="cam0-quadrant">
        <div class="cam-header">
          <span class="cam-label">Camera 0 &mdash; U / F / R</span>
        </div>
        <div class="cam-viewport" id="cam0-viewport">
          <img id="cam0" src="/video/0" alt="Camera 0" draggable="false">
          <canvas id="cam0-overlay" class="roi-overlay"></canvas>
        </div>
      </div>
      <div class="cam-quadrant" id="cam1-quadrant">
        <div class="cam-header">
          <span class="cam-label">Camera 1 &mdash; D / B / L</span>
        </div>
        <div class="cam-viewport" id="cam1-viewport">
          <img id="cam1" src="/video/1" alt="Camera 1" draggable="false">
          <canvas id="cam1-overlay" class="roi-overlay"></canvas>
        </div>
      </div>
    </div>

    <!-- RIGHT: Controls panel -->
    <div class="controls-column">
      <h1 class="title">Rubik's Cube Solver</h1>
      <span id="state-badge" class="badge">IDLE</span>

      <!-- Connection -->
      <section class="ctrl-section">
        <h3>Connection</h3>
        <div class="btn-row">
          <button id="btn-ping" class="btn">Ping Servos</button>
        </div>
      </section>

      <!-- Torque -->
      <section class="ctrl-section">
        <h3>Torque</h3>
        <div class="btn-row">
          <button id="btn-torque-on" class="btn">Torque ON</button>
          <button id="btn-torque-off" class="btn btn-danger">Torque OFF</button>
        </div>
      </section>

      <!-- Manual face rotation -->
      <section class="ctrl-section">
        <h3>Manual Face Rotation</h3>
        <div class="face-controls">
          <div class="face-row" data-face="U"><span class="face-label">U</span><button class="btn btn-sm" data-move="U">CW</button><button class="btn btn-sm" data-move="U'">CCW</button></div>
          <div class="face-row" data-face="D"><span class="face-label">D</span><button class="btn btn-sm" data-move="D">CW</button><button class="btn btn-sm" data-move="D'">CCW</button></div>
          <div class="face-row" data-face="R"><span class="face-label">R</span><button class="btn btn-sm" data-move="R">CW</button><button class="btn btn-sm" data-move="R'">CCW</button></div>
          <div class="face-row" data-face="L"><span class="face-label">L</span><button class="btn btn-sm" data-move="L">CW</button><button class="btn btn-sm" data-move="L'">CCW</button></div>
          <div class="face-row" data-face="F"><span class="face-label">F</span><button class="btn btn-sm" data-move="F">CW</button><button class="btn btn-sm" data-move="F'">CCW</button></div>
          <div class="face-row" data-face="B"><span class="face-label">B</span><button class="btn btn-sm" data-move="B">CW</button><button class="btn btn-sm" data-move="B'">CCW</button></div>
        </div>
      </section>

      <!-- Scramble -->
      <section class="ctrl-section">
        <h3>Scramble</h3>
        <div class="btn-row">
          <button id="btn-scramble" class="btn">Scramble Cube</button>
          <button id="btn-home" class="btn">Home All</button>
        </div>
      </section>

      <!-- Camera / Vision -->
      <section class="ctrl-section">
        <h3>Camera &amp; Vision</h3>
        <div class="btn-row">
          <button id="btn-freeze" class="btn">Freeze Feeds</button>
          <button id="btn-unfreeze" class="btn" disabled>Unfreeze</button>
        </div>
        <div class="btn-row">
          <button id="btn-detect" class="btn" disabled>Detect Colors</button>
          <button id="btn-roi-unlock" class="btn">Unlock ROIs</button>
        </div>
      </section>

      <!-- Detected cube state preview -->
      <section class="ctrl-section" id="detection-panel" style="display:none;">
        <h3>Detected Cube State</h3>
        <div id="cube-preview" class="cube-preview"></div>
        <p id="cube-string-display" class="mono"></p>
      </section>

      <!-- Solve -->
      <section class="ctrl-section">
        <h3>Solve</h3>
        <div class="btn-row">
          <button id="btn-solve" class="btn btn-primary" disabled>Start Solve</button>
          <button id="btn-abort" class="btn btn-danger" disabled>Abort</button>
        </div>
      </section>

      <!-- Progress -->
      <section class="ctrl-section">
        <h3>Progress</h3>
        <div class="progress-bar-outer">
          <div id="progress-bar" class="progress-bar-inner" style="width:0%"></div>
        </div>
        <p id="progress-text">Idle</p>
      </section>

      <!-- Log -->
      <section class="ctrl-section">
        <h3>Log</h3>
        <pre id="log-output"></pre>
      </section>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
